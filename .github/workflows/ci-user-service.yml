name: CI - User Service

on:
  push:
    branches: [main]
    paths:
      - 'services/user-service/**'
      - '.github/workflows/ci-user-service.yml'
  pull_request:
    paths:
      - 'services/user-service/**'

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/user-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./services/user-service/coverage/lcov.info
          flags: user-service

  build:
    name: Build & Scan
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: image-tag
        run: |
          TAG="ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image will be tagged as: ${TAG}"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: services/user-service
          push: true
          tags: ${{ steps.image-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: |
          echo "Image digest: ${{ steps.build.outputs.digest }}"
          echo "Full reference: ghcr.io/${{ github.repository }}/user-service@${{ steps.build.outputs.digest }}"

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy (table output for logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-tag }}
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@v3
        with:
          image: ${{ needs.build.outputs.image-tag }}
          fail-build: false
          severity-cutoff: high

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build.outputs.image-tag }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  sbom-validation:
    name: SBOM Validation
    runs-on: ubuntu-latest
    needs: sbom

    steps:
      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Install jq for JSON parsing
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Display SBOM summary
        run: |
          echo "## 📦 SBOM Contents" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TOTAL_PACKAGES=$(jq '.packages | length' sbom.spdx.json)
          echo "**Total packages:** $TOTAL_PACKAGES" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Top 10 Packages" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          jq -r '.packages[0:10] | .[] | "\(.name) \(.versionInfo // "unknown")"' sbom.spdx.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Check for banned packages
        run: |
          echo "## 🚫 Banned Package Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for known vulnerable packages
          # This is a simplified example - in production you'd have a comprehensive list

          BANNED_FOUND=false

          # Check for log4j < 2.17.1 (Log4Shell vulnerability)
          if jq -e '.packages[] | select(.name | test("log4j"; "i")) | select(.versionInfo | test("^2\\.(0|1[0-6])\\."))' sbom.spdx.json > /dev/null 2>&1; then
            echo "❌ **CRITICAL**: log4j < 2.17.1 detected (CVE-2021-44228)" >> $GITHUB_STEP_SUMMARY
            BANNED_FOUND=true
          fi

          # Check for other examples (these won't actually be in our Node.js app)
          # Just demonstrating what real validation looks like

          if [ "$BANNED_FOUND" = true ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Result:** ❌ Deployment blocked due to banned packages" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**NOTE**: In this demo, we continue anyway to show the pipeline." >> $GITHUB_STEP_SUMMARY
            echo "In production, this would BLOCK deployment." >> $GITHUB_STEP_SUMMARY
            # exit 1  # Uncomment to actually block deployment
          else
            echo "✅ No banned packages detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check license compliance
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📜 License Compliance Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract unique licenses
          LICENSES=$(jq -r '.packages[].licenseConcluded // "NOASSERTION"' sbom.spdx.json | sort -u)

          echo "**Licenses found:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$LICENSES" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for banned licenses (GPL, AGPL for proprietary software)
          BANNED_LICENSES="GPL|AGPL|SSPL"

          if echo "$LICENSES" | grep -iE "$BANNED_LICENSES" > /dev/null 2>&1; then
            echo "⚠️ **WARNING**: Potentially incompatible licenses detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Banned licenses found:**" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$LICENSES" | grep -iE "$BANNED_LICENSES" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**NOTE**: This would require legal review before deployment." >> $GITHUB_STEP_SUMMARY
            # exit 1  # Uncomment to block deployment
          else
            echo "✅ All licenses are compliant" >> $GITHUB_STEP_SUMMARY
          fi

      - name: SBOM validation summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 💡 What This Demonstrates" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Easy**: Generate SBOM (Syft does this automatically)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "❌ **Hard**: Actually USE the SBOM to enforce policies" >> $GITHUB_STEP_SUMMARY
          echo "- Custom bash/jq scripting for each check" >> $GITHUB_STEP_SUMMARY
          echo "- Maintain banned package lists manually" >> $GITHUB_STEP_SUMMARY
          echo "- Update license policies in 1000 workflow files" >> $GITHUB_STEP_SUMMARY
          echo "- No centralized SBOM database for queries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**At scale**: This validation code × 1000 repositories = configuration drift nightmare" >> $GITHUB_STEP_SUMMARY

  sign:
    name: Sign Image
    runs-on: ubuntu-latest
    needs: [build, security-scan, sbom-validation]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with Cosign
        env:
          IMAGE_DIGEST: ghcr.io/${{ github.repository }}/user-service@${{ needs.build.outputs.image-digest }}
        run: |
          echo "Signing image: $IMAGE_DIGEST"
          cosign sign --yes $IMAGE_DIGEST

      - name: Verify signature
        env:
          IMAGE_DIGEST: ghcr.io/${{ github.repository }}/user-service@${{ needs.build.outputs.image-digest }}
        run: |
          cosign verify $IMAGE_DIGEST \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com

      - name: Download SBOM for attestation
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Attach SBOM as signed attestation
        env:
          IMAGE_DIGEST: ghcr.io/${{ github.repository }}/user-service@${{ needs.build.outputs.image-digest }}
        run: |
          echo "## 🔏 SBOM Attestation (Cryptographic Binding)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`$IMAGE_DIGEST\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validating SBOM format and attaching to image..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Verify SBOM is valid JSON
          if ! jq empty sbom.spdx.json 2>/dev/null; then
            echo "❌ SBOM is not valid JSON" >> $GITHUB_STEP_SUMMARY
            cat sbom.spdx.json | head -20
            exit 1
          fi

          # Attach SBOM to image as a signed attestation
          # Using image digest (not tag) for security
          # Using spdxjson predicate type (Cosign-compatible format)
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            $IMAGE_DIGEST

          echo "✅ **SBOM attestation created and signed**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**What this provides:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SBOM is cryptographically signed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SBOM is bound to image digest" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Tamper detection (any modification breaks signature)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Verifiable chain of custody" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Storage options now available:**" >> $GITHUB_STEP_SUMMARY
          echo "- Store in external artifact repo (Artifactory, Nexus)" >> $GITHUB_STEP_SUMMARY
          echo "- Store in S3/cloud storage" >> $GITHUB_STEP_SUMMARY
          echo "- Share with 3rd parties securely" >> $GITHUB_STEP_SUMMARY
          echo "- Verification works regardless of storage location" >> $GITHUB_STEP_SUMMARY

      - name: Verify SBOM attestation
        env:
          IMAGE_DIGEST: ghcr.io/${{ github.repository }}/user-service@${{ needs.build.outputs.image-digest }}
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verifying SBOM attestation signature..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Verify the attestation is signed correctly
          # Using spdxjson type to match what we attached
          # Output can be large (800+ packages), so redirect to file
          if cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            $IMAGE_DIGEST > attestation-verify.json 2>&1; then
            echo "✅ **SBOM attestation signature verified**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **SBOM attestation verification failed**" >> $GITHUB_STEP_SUMMARY
            echo "See logs for details" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**The complexity gap:**" >> $GITHUB_STEP_SUMMARY
          echo "- Must use image **digest** (not tag) for security" >> $GITHUB_STEP_SUMMARY
          echo "- Requires passing digest between workflow jobs" >> $GITHUB_STEP_SUMMARY
          echo "- This took **40 lines of custom code**" >> $GITHUB_STEP_SUMMARY
          echo "- Requires Cosign expertise" >> $GITHUB_STEP_SUMMARY
          echo "- Requires understanding OIDC keyless signing" >> $GITHUB_STEP_SUMMARY
          echo "- Must handle certificate identity matching" >> $GITHUB_STEP_SUMMARY
          echo "- × 1000 services = maintenance nightmare" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**With Harness:** Built-in, zero code required" >> $GITHUB_STEP_SUMMARY

  policy-validation:
    name: Policy Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.48.0/conftest_0.48.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.48.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Validate Dockerfile
        working-directory: services/user-service
        run: |
          conftest test Dockerfile -p ../../platform/policies/docker/

      - name: Validate Kubernetes manifests
        working-directory: services/user-service
        run: |
          conftest test k8s/ -p ../../platform/policies/kubernetes/

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, security-scan, sbom, sbom-validation, sign, policy-validation]
    if: always()

    steps:
      - name: Check CI status
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ SBOM Generation: ${{ needs.sbom.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ SBOM Validation: ${{ needs.sbom-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Signing: ${{ needs.sign.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Policy Validation: ${{ needs.policy-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
