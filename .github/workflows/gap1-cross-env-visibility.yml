name: "GAP 1 DEMO: Cross-Environment Visibility"

# This workflow demonstrates DEMO.md Gap 1:
# "Show me what version of all 50 microservices is deployed in
#  Dev, QA, Staging, and Production right now."
#
# With GitHub Actions + ArgoCD, this requires manual kubectl queries
# across every environment. No unified dashboard exists.

on:
  workflow_dispatch:  # Manual trigger to demonstrate the gap
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours - continuous visibility burden

permissions:
  contents: read

jobs:
  cross-environment-visibility:
    name: Manual Cross-Environment Query
    runs-on: ubuntu-latest

    steps:
      - name: Setup
        run: |
          echo "## 🔍 GAP 1: Cross-Environment Visibility" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**THE QUESTION**: What version of all services is deployed in Dev, QA, Staging, and Production?" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**THE PROBLEM**: No unified dashboard. Must query each environment manually." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Simulate Dev Environment Query
        run: |
          echo "## Dev Environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Manual Query Required:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl config use-context dev' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl get deployment user-service -n user-service-dev -o jsonpath="{.spec.template.spec.containers[0].image}"' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl get deployment payment-service -n payment-service-dev -o jsonpath="{.spec.template.spec.containers[0].image}"' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl get deployment notification-service -n notification-service-dev -o jsonpath="{.spec.template.spec.containers[0].image}"' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Result:** 3 manual commands. Multiply by 50 services = 150 commands" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Simulate QA Environment Query
        run: |
          echo "## QA Environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Manual Query Required:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl config use-context qa' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl get deployment user-service -n user-service-qa -o jsonpath="{.spec.template.spec.containers[0].image}"' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl get deployment payment-service -n payment-service-qa -o jsonpath="{.spec.template.spec.containers[0].image}"' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl get deployment notification-service -n notification-service-qa -o jsonpath="{.spec.template.spec.containers[0].image}"' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Simulate Staging Environment Query
        run: |
          echo "## Staging Environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Manual Query Required:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl config use-context staging' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl get deployment user-service -n user-service-staging -o jsonpath="{.spec.template.spec.containers[0].image}"' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl get deployment payment-service -n payment-service-staging -o jsonpath="{.spec.template.spec.containers[0].image}"' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl get deployment notification-service -n notification-service-staging -o jsonpath="{.spec.template.spec.containers[0].image}"' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Simulate Production Environment Query
        run: |
          echo "## Production Environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Manual Query Required:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl config use-context production' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl get deployment user-service -n user-service-prod -o jsonpath="{.spec.template.spec.containers[0].image}"' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl get deployment payment-service -n payment-service-prod -o jsonpath="{.spec.template.spec.containers[0].image}"' >> $GITHUB_STEP_SUMMARY
          echo 'kubectl get deployment notification-service -n notification-service-prod -o jsonpath="{.spec.template.spec.containers[0].image}"' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: The Manual Correlation Problem
        run: |
          echo "## The Correlation Nightmare" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**You now have 200 image tags like:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo 'ghcr.io/org/user-service:abc123def' >> $GITHUB_STEP_SUMMARY
          echo 'ghcr.io/org/payment-service:def456ghi' >> $GITHUB_STEP_SUMMARY
          echo 'ghcr.io/org/notification-service:ghi789jkl' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Problem:** You must MANUALLY correlate git commit SHAs to understand:" >> $GITHUB_STEP_SUMMARY
          echo "- Which feature is in which environment?" >> $GITHUB_STEP_SUMMARY
          echo "- When was it deployed?" >> $GITHUB_STEP_SUMMARY
          echo "- Who deployed it?" >> $GITHUB_STEP_SUMMARY
          echo "- What changed between environments?" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time required:** 15-20 minutes of manual kubectl + git log queries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: What Enterprises Actually Build (IDP)
        run: |
          echo "## What Platform Teams Are Forced to Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To avoid this manual pain, teams build an **Internal Developer Portal (IDP)** like Spotify Backstage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**IDP Requirements:**" >> $GITHUB_STEP_SUMMARY
          echo "- Database to store deployment history" >> $GITHUB_STEP_SUMMARY
          echo "- Custom plugins to aggregate GHA webhooks, ArgoCD sync events, K8s state" >> $GITHUB_STEP_SUMMARY
          echo "- API to query the aggregated data" >> $GITHUB_STEP_SUMMARY
          echo "- UI dashboard for environment matrix view" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Engineering Cost:**" >> $GITHUB_STEP_SUMMARY
          echo "- Build time: 6-8 weeks" >> $GITHUB_STEP_SUMMARY
          echo "- Maintenance: 4-6 hours/week" >> $GITHUB_STEP_SUMMARY
          echo "- Your platform team is now maintaining a **data pipeline**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: The Harness Approach
        run: |
          echo "## The Harness Alternative" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Single API Query:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'curl https://app.harness.io/api/services/matrix' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Returns (in 5 seconds):**" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo '{' >> $GITHUB_STEP_SUMMARY
          echo '  "user-service": {' >> $GITHUB_STEP_SUMMARY
          echo '    "dev": "v1.2.5 (deployed 2h ago)",' >> $GITHUB_STEP_SUMMARY
          echo '    "qa": "v1.2.4 (deployed 1d ago)",' >> $GITHUB_STEP_SUMMARY
          echo '    "staging": "v1.2.4 (deployed 1d ago)",' >> $GITHUB_STEP_SUMMARY
          echo '    "production": "v1.2.3 (deployed 3d ago)"' >> $GITHUB_STEP_SUMMARY
          echo '  },' >> $GITHUB_STEP_SUMMARY
          echo '  ... (all 50 services)' >> $GITHUB_STEP_SUMMARY
          echo '}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** 5 seconds" >> $GITHUB_STEP_SUMMARY
          echo "**Maintenance:** 0 hours (Harness maintains the state tracking)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        run: |
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## The Bottom Line" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Approach | Time | Maintenance | Outcome |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|-------------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Manual kubectl** | 15-20 min | 0 hrs (but slow) | Manual correlation required |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build IDP (Backstage)** | 5 sec | 4-6 hrs/week | Custom data pipeline to maintain |" >> $GITHUB_STEP_SUMMARY
          echo "| **Harness** | 5 sec | 0 hrs | Built-in, out of the box |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**The gap isn't 'can you check what's deployed?' — it's cross-environment visibility at scale.**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See: [DEMO.md - Gap 1](../../docs/DEMO.md#gap-1-cross-environment-visibility-not-single-service-state)" >> $GITHUB_STEP_SUMMARY
