name: CI - Notification Service

on:
  push:
    branches: [main]
    paths:
      - 'services/notification-service/**'
      - '.github/workflows/ci-notification-service.yml'
  pull_request:
    paths:
      - 'services/notification-service/**'

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/notification-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./services/notification-service/coverage.xml
          flags: notification-service

  build:
    name: Build & Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/notification-service
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/notification-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract image tag
        id: image
        run: |
          echo "tag=ghcr.io/${{ github.repository }}/notification-service:main-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy (table output for logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.tag }}
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@v3
        with:
          image: ${{ steps.image.outputs.tag }}
          fail-build: false
          severity-cutoff: high

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract image tag
        id: image
        run: |
          echo "tag=ghcr.io/${{ github.repository }}/notification-service:main-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.tag }}
          format: spdx-json
          output-file: sbom-notification.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-notification
          path: sbom-notification.spdx.json

  sign:
    name: Sign Image
    runs-on: ubuntu-latest
    needs: [security-scan, sbom]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image tag
        id: image
        run: |
          echo "tag=ghcr.io/${{ github.repository }}/notification-service:main-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Sign image with Cosign
        run: |
          cosign sign --yes ${{ steps.image.outputs.tag }}

      - name: Verify signature
        run: |
          cosign verify ${{ steps.image.outputs.tag }} \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com

  policy-validation:
    name: Policy Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.48.0/conftest_0.48.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.48.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Validate Dockerfile
        working-directory: services/notification-service
        run: |
          conftest test Dockerfile -p ../../platform/policies/docker/

      - name: Validate Kubernetes manifests
        working-directory: services/notification-service
        run: |
          conftest test k8s/ -p ../../platform/policies/kubernetes/

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, security-scan, sbom, sign, policy-validation]
    if: always()

    steps:
      - name: Check CI status
        run: |
          echo "## CI Pipeline Results - Notification Service" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ SBOM: ${{ needs.sbom.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Signing: ${{ needs.sign.result }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Policy Validation: ${{ needs.policy-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`ghcr.io/${{ github.repository }}/notification-service:main-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
