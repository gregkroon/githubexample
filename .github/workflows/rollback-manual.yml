name: Manual Rollback - User Service

# This workflow shows the MANUAL process required to rollback
# Compare this to Harness one-click rollback

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'Git SHA to rollback to (previous good commit)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  verify-rollback:
    name: Verify Rollback Target
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify target commit exists
        run: |
          if ! git cat-file -e ${{ inputs.target_sha }}^{commit}; then
            echo "❌ ERROR: Commit ${{ inputs.target_sha }} does not exist"
            exit 1
          fi

          echo "✅ Commit ${{ inputs.target_sha }} found"
          echo ""
          echo "Commit details:"
          git log -1 ${{ inputs.target_sha }}

      - name: Show what changed
        run: |
          echo "## Changes that will be rolled back:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git diff ${{ inputs.target_sha }}..HEAD -- services/user-service/ >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  create-rollback-commit:
    name: Create Rollback Commit
    runs-on: ubuntu-latest
    needs: verify-rollback

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Revert to target commit
        run: |
          # Checkout the files from the target commit
          git checkout ${{ inputs.target_sha }} -- services/user-service/

          # Check if there are changes
          if git diff --quiet; then
            echo "No changes needed - already at target version"
            exit 0
          fi

          # Configure git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Create rollback commit
          git add services/user-service/
          git commit -m "Rollback user-service to ${{ inputs.target_sha }}

          This is a manual rollback commit.

          Previous commit: $(git rev-parse HEAD)
          Target commit: ${{ inputs.target_sha }}

          Reason: Manual rollback triggered via workflow_dispatch
          "

          # Push the rollback commit
          git push origin main

      - name: Rollback summary
        run: |
          echo "## ⏪ Rollback Initiated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target commit**: \`${{ inputs.target_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: Rollback commit pushed to main" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps**:" >> $GITHUB_STEP_SUMMARY
          echo "1. CI workflow will run (~7 minutes)" >> $GITHUB_STEP_SUMMARY
          echo "2. CD workflow will deploy rollback (~4 minutes)" >> $GITHUB_STEP_SUMMARY
          echo "3. **Total rollback time: ~11+ minutes**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Compare to Harness**:" >> $GITHUB_STEP_SUMMARY
          echo "- Harness: Click 'Rollback' button → < 60 seconds" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub: Manual workflow → 11+ minutes" >> $GITHUB_STEP_SUMMARY

  wait-for-deployment:
    name: Wait for Rollback Deployment
    runs-on: ubuntu-latest
    needs: create-rollback-commit

    steps:
      - name: Wait for CI/CD to complete
        run: |
          echo "⏳ Waiting for CI/CD pipelines to redeploy rollback version..."
          echo ""
          echo "This is the MANUAL process required in GitHub:"
          echo "1. ✅ Rollback commit created"
          echo "2. ⏳ Waiting for CI workflow (~7 min)"
          echo "3. ⏳ Waiting for CD workflow (~4 min)"
          echo "4. ⏳ Total time: 11+ minutes"
          echo ""
          echo "In Harness: Click button → 60 seconds"
          echo ""
          echo "Check deployment at: https://github.com/${{ github.repository }}/actions"
