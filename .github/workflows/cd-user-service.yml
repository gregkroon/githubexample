name: CD - User Service

on:
  workflow_run:
    workflows: ["CI - User Service"]
    types:
      - completed
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: dev
      url: https://dev.user-service.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: dev
          wait: 30s

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load image into kind
        run: |
          # Pull image
          docker pull ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}

          # Load into kind
          kind load docker-image ghcr.io/${{ github.repository }}/user-service:${{ github.sha }} --name dev

      - name: Create namespace
        run: |
          kubectl create namespace user-service-dev || true

      - name: Install Cosign
        uses: sigstore/cosign-installer@main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image digest
        id: get-digest
        run: |
          # Pull image manifest to get digest (not the image itself)
          IMAGE_TAG="ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}"
          DIGEST=$(docker manifest inspect $IMAGE_TAG | jq -r '.config.digest' || \
                   docker buildx imagetools inspect $IMAGE_TAG --format '{{.Manifest.Digest}}')

          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Image digest: $DIGEST"
          echo "Full reference: ghcr.io/${{ github.repository }}/user-service@$DIGEST"

      - name: Verify SBOM attestation (deployment gate)
        env:
          IMAGE_DIGEST: ghcr.io/${{ github.repository }}/user-service@${{ steps.get-digest.outputs.digest }}
        run: |
          echo "## 🔐 SBOM Attestation Verification (Deployment Gate)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`$IMAGE_DIGEST\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Why we verify attestations:**" >> $GITHUB_STEP_SUMMARY
          echo "- SBOM could be stored in 3rd party repos (Artifactory, Nexus, S3)" >> $GITHUB_STEP_SUMMARY
          echo "- Must cryptographically prove SBOM is authentic" >> $GITHUB_STEP_SUMMARY
          echo "- Signature verifies: identity, integrity, and binding to image" >> $GITHUB_STEP_SUMMARY
          echo "- **Must use digest (not tag)** for security" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Verify the SBOM attestation signature using digest
          echo "Verifying SBOM attestation signature..."

          cosign verify-attestation \
            --type spdx \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            $IMAGE_DIGEST > attestation.json || {
            echo "❌ **DEPLOYMENT BLOCKED**: SBOM attestation verification failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Possible causes:**" >> $GITHUB_STEP_SUMMARY
            echo "- SBOM attestation not attached to image" >> $GITHUB_STEP_SUMMARY
            echo "- Signature verification failed (tampering detected)" >> $GITHUB_STEP_SUMMARY
            echo "- Certificate identity mismatch" >> $GITHUB_STEP_SUMMARY
            echo "- OIDC token issues" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⏩ **Proceeding with deployment** (for demo)" >> $GITHUB_STEP_SUMMARY
            echo "   **In production: This would HARD FAIL**" >> $GITHUB_STEP_SUMMARY
            exit 0
          }

          echo "✅ **SBOM attestation signature verified**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract and validate SBOM contents
          sudo apt-get update -qq && sudo apt-get install -y -qq jq > /dev/null 2>&1

          cat attestation.json | jq -r '.payload' | base64 -d | jq '.predicate' > sbom-verified.json

          PACKAGE_COUNT=$(jq '.packages | length' sbom-verified.json)

          echo "**Verified SBOM contents:**" >> $GITHUB_STEP_SUMMARY
          echo "- Total packages: $PACKAGE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Signature: ✅ Valid" >> $GITHUB_STEP_SUMMARY
          echo "- Bound to image: ✅ Yes (cryptographically)" >> $GITHUB_STEP_SUMMARY
          echo "- Tamper-proof: ✅ Yes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Deployment gate check
          if [ "$PACKAGE_COUNT" -lt 10 ]; then
            echo "❌ **FAIL**: SBOM incomplete ($PACKAGE_COUNT packages)" >> $GITHUB_STEP_SUMMARY
            # exit 1
          else
            echo "✅ **Deployment gate PASSED**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**The complexity gap (50 lines of code):**" >> $GITHUB_STEP_SUMMARY
          echo "- Install Cosign" >> $GITHUB_STEP_SUMMARY
          echo "- Get image digest (tags are mutable, insecure)" >> $GITHUB_STEP_SUMMARY
          echo "- Verify attestation with certificate matching" >> $GITHUB_STEP_SUMMARY
          echo "- Extract signed payload from base64" >> $GITHUB_STEP_SUMMARY
          echo "- Parse and validate SBOM contents" >> $GITHUB_STEP_SUMMARY
          echo "- Handle verification failures gracefully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**× 1000 services = 50,000 lines across deployment workflows**" >> $GITHUB_STEP_SUMMARY

      - name: Create environment-specific config
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://dev-db:5432/users_dev' }}
          API_KEY: ${{ secrets.API_KEY || 'dev-api-key-12345' }}
          ENVIRONMENT: dev
        run: |
          # Create ConfigMap with environment-specific configuration
          kubectl create configmap user-service-config \
            --from-literal=ENVIRONMENT=$ENVIRONMENT \
            --from-literal=LOG_LEVEL=debug \
            --from-literal=FEATURE_FLAGS='{"newUI":true,"betaFeatures":true}' \
            -n user-service-dev \
            --dry-run=client -o yaml | kubectl apply -f -

          # Create Secret with sensitive data (DB credentials, API keys)
          kubectl create secret generic user-service-secrets \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=API_KEY="$API_KEY" \
            -n user-service-dev \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "✅ Dev environment config created"
          echo "   Environment: dev"
          echo "   Log Level: debug"
          echo "   Database: ${DATABASE_URL%%:*}://***" # Show only protocol
          echo "   API Key: ${API_KEY:0:3}***" # Show only first 3 chars

      - name: Update deployment manifest with actual image
        run: |
          sed -i "s|IMAGE_TAG|ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}|g" services/user-service/k8s/deployment.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f services/user-service/k8s/ -n user-service-dev

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/user-service -n user-service-dev --timeout=5m

      - name: Verify pods are running
        run: |
          kubectl get pods -n user-service-dev
          kubectl wait --for=condition=ready pod -l app=user-service -n user-service-dev --timeout=3m

      - name: Run smoke tests
        run: |
          kubectl port-forward -n user-service-dev svc/user-service 3000:3000 &
          PF_PID=$!
          sleep 5

          # Test health endpoint
          curl -f http://localhost:3000/health || exit 1

          # Test users endpoint
          curl -f http://localhost:3000/api/users || exit 1

          # Test metrics endpoint
          curl -f http://localhost:3000/metrics || exit 1

          # Test creating a user
          RESPONSE=$(curl -s -X POST http://localhost:3000/api/users \
            -H "Content-Type: application/json" \
            -d '{"name":"Test User","email":"test@example.com"}')

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q "Test User"; then
            echo "✅ POST /api/users works"
          else
            echo "❌ POST /api/users failed"
            exit 1
          fi

          kill $PF_PID

          echo "✅ All Dev smoke tests passed"

      - name: Get deployment info
        if: always()
        run: |
          echo "## 🟢 Dev Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Dev" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pods" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n user-service-dev >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n user-service-dev >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Show logs on failure
        if: failure()
        run: |
          echo "## Pod Logs" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl logs -n user-service-dev -l app=user-service --tail=100 >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: production
      url: https://user-service.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create kind cluster (simulating prod)
        uses: helm/kind-action@v1
        with:
          cluster_name: prod
          wait: 30s

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load image into kind
        run: |
          # Pull image
          docker pull ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}

          # Load into kind
          kind load docker-image ghcr.io/${{ github.repository }}/user-service:${{ github.sha }} --name prod

      - name: Create namespace
        run: |
          kubectl create namespace user-service-prod || true

      - name: Install Cosign
        uses: sigstore/cosign-installer@main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image digest
        id: get-digest-prod
        run: |
          # Get image digest (required for secure attestation verification)
          IMAGE_TAG="ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}"
          DIGEST=$(docker buildx imagetools inspect $IMAGE_TAG --format '{{.Manifest.Digest}}')

          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Production image digest: $DIGEST"

      - name: Verify SBOM attestation for production
        env:
          IMAGE_DIGEST: ghcr.io/${{ github.repository }}/user-service@${{ steps.get-digest-prod.outputs.digest }}
        run: |
          echo "## 🔐 Production SBOM Attestation Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**CRITICAL**: Production requires cryptographically verified SBOM" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`$IMAGE_DIGEST\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Why attestation matters for production:**" >> $GITHUB_STEP_SUMMARY
          echo "- Compliance requirements (SLSA, SSDF)" >> $GITHUB_STEP_SUMMARY
          echo "- Supply chain security (prove provenance)" >> $GITHUB_STEP_SUMMARY
          echo "- Legal liability (evidence of due diligence)" >> $GITHUB_STEP_SUMMARY
          echo "- Audit trail (non-repudiation)" >> $GITHUB_STEP_SUMMARY
          echo "- **Security**: Must use digest (not mutable tag)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Verify SBOM attestation using digest
          cosign verify-attestation \
            --type spdx \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            $IMAGE_DIGEST > prod-attestation.json || {
            echo "❌ **PRODUCTION DEPLOYMENT BLOCKED**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Failure reason:** SBOM attestation verification failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Production policy:** Zero tolerance for unverified artifacts" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⏩ **Proceeding with deployment** (demo only)" >> $GITHUB_STEP_SUMMARY
            echo "   **In real production: HARD STOP - no deployment**" >> $GITHUB_STEP_SUMMARY
            exit 0
          }

          echo "✅ **SBOM attestation verified for production**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract and validate
          sudo apt-get update -qq && sudo apt-get install -y -qq jq > /dev/null 2>&1
          cat prod-attestation.json | jq -r '.payload' | base64 -d | jq '.predicate' > prod-sbom.json

          PACKAGE_COUNT=$(jq '.packages | length' prod-sbom.json)

          echo "**Verified SBOM for production:**" >> $GITHUB_STEP_SUMMARY
          echo "- Packages: $PACKAGE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Cryptographic signature: ✅ Valid" >> $GITHUB_STEP_SUMMARY
          echo "- Image binding: ✅ Verified" >> $GITHUB_STEP_SUMMARY
          echo "- Verified at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Production-specific checks
          echo "**Production-specific policy checks:**" >> $GITHUB_STEP_SUMMARY

          # Check for dev dependencies
          DEV_DEPS=$(jq -r '.packages[] | select(.name | test("nodemon|jest|eslint|@types"))' prod-sbom.json 2>/dev/null | wc -l || echo "0")

          if [ "$DEV_DEPS" -gt 0 ]; then
            echo "⚠️ **WARNING**: $DEV_DEPS dev dependencies in production" >> $GITHUB_STEP_SUMMARY
            echo "   (Increases attack surface)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Clean production image (no dev dependencies)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Production deployment gate PASSED**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total code for secure SBOM enforcement:**" >> $GITHUB_STEP_SUMMARY
          echo "- CI: 50 lines (capture digest + sign + attach attestation)" >> $GITHUB_STEP_SUMMARY
          echo "- CD Dev: 50 lines (resolve digest + verify attestation)" >> $GITHUB_STEP_SUMMARY
          echo "- CD Prod: 50 lines (resolve digest + verify attestation)" >> $GITHUB_STEP_SUMMARY
          echo "- Total: **150 lines just for attestation**" >> $GITHUB_STEP_SUMMARY
          echo "- Plus: **90 lines for SBOM validation logic**" >> $GITHUB_STEP_SUMMARY
          echo "- **Grand total: 240 lines for secure SBOM**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Why digest instead of tag:**" >> $GITHUB_STEP_SUMMARY
          echo "- Tags are mutable (can be changed)" >> $GITHUB_STEP_SUMMARY
          echo "- Digests are immutable (cryptographic hash)" >> $GITHUB_STEP_SUMMARY
          echo "- CD must resolve tag → digest at deployment time" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**With Harness: 0 lines (config-driven, digest handling automatic)**" >> $GITHUB_STEP_SUMMARY

      - name: Create environment-specific config
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://prod-db.internal:5432/users_production' }}
          API_KEY: ${{ secrets.API_KEY || 'prod-api-key-CHANGE-ME' }}
          ENVIRONMENT: production
        run: |
          # Create ConfigMap with environment-specific configuration
          kubectl create configmap user-service-config \
            --from-literal=ENVIRONMENT=$ENVIRONMENT \
            --from-literal=LOG_LEVEL=info \
            --from-literal=FEATURE_FLAGS='{"newUI":false,"betaFeatures":false}' \
            -n user-service-prod \
            --dry-run=client -o yaml | kubectl apply -f -

          # Create Secret with sensitive data (DB credentials, API keys)
          kubectl create secret generic user-service-secrets \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=API_KEY="$API_KEY" \
            -n user-service-prod \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "✅ Production environment config created"
          echo "   Environment: production"
          echo "   Log Level: info"
          echo "   Database: ${DATABASE_URL%%:*}://***" # Show only protocol
          echo "   API Key: ${API_KEY:0:3}***" # Show only first 3 chars

      - name: Update deployment manifest with actual image
        run: |
          sed -i "s|IMAGE_TAG|ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}|g" services/user-service/k8s/deployment.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f services/user-service/k8s/ -n user-service-prod

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/user-service -n user-service-prod --timeout=5m

      - name: Verify pods are running
        run: |
          kubectl get pods -n user-service-prod
          kubectl wait --for=condition=ready pod -l app=user-service -n user-service-prod --timeout=3m

      - name: Run production smoke tests
        run: |
          kubectl port-forward -n user-service-prod svc/user-service 3000:3000 &
          PF_PID=$!
          sleep 5

          # Test health endpoint
          curl -f http://localhost:3000/health || exit 1

          # Test users endpoint
          curl -f http://localhost:3000/api/users || exit 1

          # Test metrics endpoint
          curl -f http://localhost:3000/metrics || exit 1

          # Test creating a user
          RESPONSE=$(curl -s -X POST http://localhost:3000/api/users \
            -H "Content-Type: application/json" \
            -d '{"name":"Prod User","email":"prod@example.com"}')

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q "Prod User"; then
            echo "✅ POST /api/users works in production"
          else
            echo "❌ POST /api/users failed in production"
            exit 1
          fi

          kill $PF_PID

          echo "✅ All Production smoke tests passed"

      - name: Get deployment info
        if: always()
        run: |
          echo "## 🔴 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pods" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n user-service-prod >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n user-service-prod >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Show logs on failure
        if: failure()
        run: |
          echo "## Production Pod Logs" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl logs -n user-service-prod -l app=user-service --tail=100 >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-prod]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## 🚀 Deployment Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dev | ${{ needs.deploy-dev.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.deploy-prod.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Flow" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ CI Pipeline (build, scan, sign)" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ Deploy to Dev (automatic)" >> $GITHUB_STEP_SUMMARY
          echo "3. ⏸️  Manual approval required" >> $GITHUB_STEP_SUMMARY
          echo "4. ✅ Deploy to Production" >> $GITHUB_STEP_SUMMARY
