name: CD - User Service

on:
  workflow_run:
    workflows: ["CI - User Service"]
    types:
      - completed
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: dev
      url: https://dev.user-service.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: dev
          wait: 30s

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load image into kind
        run: |
          # Pull image
          docker pull ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}

          # Load into kind
          kind load docker-image ghcr.io/${{ github.repository }}/user-service:${{ github.sha }} --name dev

      - name: Create namespace
        run: |
          kubectl create namespace user-service-dev || true

      - name: Verify SBOM exists (deployment gate)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## 🔐 SBOM Verification (Deployment Gate)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Try to download SBOM from CI workflow
          # This demonstrates the cross-workflow coordination complexity

          CI_RUN_ID="${{ github.event.workflow_run.id }}"

          echo "Attempting to download SBOM from CI workflow run: $CI_RUN_ID"

          # Download artifact from the triggering CI workflow
          gh run download $CI_RUN_ID --name sbom --dir ./sbom-download || {
            echo "⚠️ **WARNING**: Could not download SBOM from CI workflow" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Why this is complex:**" >> $GITHUB_STEP_SUMMARY
            echo "- CD workflow runs separately from CI" >> $GITHUB_STEP_SUMMARY
            echo "- Must coordinate artifacts across workflows" >> $GITHUB_STEP_SUMMARY
            echo "- Requires GitHub CLI and proper permissions" >> $GITHUB_STEP_SUMMARY
            echo "- Artifact retention policies can cause failures" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**In production, you'd need:**" >> $GITHUB_STEP_SUMMARY
            echo "- Centralized artifact storage" >> $GITHUB_STEP_SUMMARY
            echo "- SBOM attached to image as attestation" >> $GITHUB_STEP_SUMMARY
            echo "- Or SBOM stored in external registry" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⏩ **Proceeding with deployment** (for demo purposes)" >> $GITHUB_STEP_SUMMARY
            echo "   In production: This would BLOCK deployment" >> $GITHUB_STEP_SUMMARY
            exit 0  # Don't fail deployment in demo
          }

          # If we got the SBOM, validate it
          if [ -f ./sbom-download/sbom.spdx.json ]; then
            echo "✅ SBOM artifact found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Install jq for validation
            sudo apt-get update -qq && sudo apt-get install -y -qq jq > /dev/null 2>&1

            # Quick validation
            PACKAGE_COUNT=$(jq '.packages | length' ./sbom-download/sbom.spdx.json)
            echo "**SBOM validated:**" >> $GITHUB_STEP_SUMMARY
            echo "- Total packages: $PACKAGE_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- Format: SPDX JSON" >> $GITHUB_STEP_SUMMARY
            echo "- Source: CI workflow run #$CI_RUN_ID" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Check for any high-risk packages (example)
            echo "**Deployment gate checks:**" >> $GITHUB_STEP_SUMMARY

            # Example: Check if SBOM has any packages (basic validation)
            if [ "$PACKAGE_COUNT" -lt 10 ]; then
              echo "❌ **FAIL**: SBOM has too few packages ($PACKAGE_COUNT < 10)" >> $GITHUB_STEP_SUMMARY
              echo "   This might indicate incomplete SBOM generation" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "⏩ **Proceeding anyway** (for demo)" >> $GITHUB_STEP_SUMMARY
              # exit 1  # Uncomment to actually block
            else
              echo "✅ SBOM contains $PACKAGE_COUNT packages (healthy)" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Deployment gate PASSED** - SBOM verified" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create environment-specific config
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://dev-db:5432/users_dev' }}
          API_KEY: ${{ secrets.API_KEY || 'dev-api-key-12345' }}
          ENVIRONMENT: dev
        run: |
          # Create ConfigMap with environment-specific configuration
          kubectl create configmap user-service-config \
            --from-literal=ENVIRONMENT=$ENVIRONMENT \
            --from-literal=LOG_LEVEL=debug \
            --from-literal=FEATURE_FLAGS='{"newUI":true,"betaFeatures":true}' \
            -n user-service-dev \
            --dry-run=client -o yaml | kubectl apply -f -

          # Create Secret with sensitive data (DB credentials, API keys)
          kubectl create secret generic user-service-secrets \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=API_KEY="$API_KEY" \
            -n user-service-dev \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "✅ Dev environment config created"
          echo "   Environment: dev"
          echo "   Log Level: debug"
          echo "   Database: ${DATABASE_URL%%:*}://***" # Show only protocol
          echo "   API Key: ${API_KEY:0:3}***" # Show only first 3 chars

      - name: Update deployment manifest with actual image
        run: |
          sed -i "s|IMAGE_TAG|ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}|g" services/user-service/k8s/deployment.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f services/user-service/k8s/ -n user-service-dev

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/user-service -n user-service-dev --timeout=5m

      - name: Verify pods are running
        run: |
          kubectl get pods -n user-service-dev
          kubectl wait --for=condition=ready pod -l app=user-service -n user-service-dev --timeout=3m

      - name: Run smoke tests
        run: |
          kubectl port-forward -n user-service-dev svc/user-service 3000:3000 &
          PF_PID=$!
          sleep 5

          # Test health endpoint
          curl -f http://localhost:3000/health || exit 1

          # Test users endpoint
          curl -f http://localhost:3000/api/users || exit 1

          # Test metrics endpoint
          curl -f http://localhost:3000/metrics || exit 1

          # Test creating a user
          RESPONSE=$(curl -s -X POST http://localhost:3000/api/users \
            -H "Content-Type: application/json" \
            -d '{"name":"Test User","email":"test@example.com"}')

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q "Test User"; then
            echo "✅ POST /api/users works"
          else
            echo "❌ POST /api/users failed"
            exit 1
          fi

          kill $PF_PID

          echo "✅ All Dev smoke tests passed"

      - name: Get deployment info
        if: always()
        run: |
          echo "## 🟢 Dev Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Dev" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pods" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n user-service-dev >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n user-service-dev >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Show logs on failure
        if: failure()
        run: |
          echo "## Pod Logs" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl logs -n user-service-dev -l app=user-service --tail=100 >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: production
      url: https://user-service.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create kind cluster (simulating prod)
        uses: helm/kind-action@v1
        with:
          cluster_name: prod
          wait: 30s

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load image into kind
        run: |
          # Pull image
          docker pull ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}

          # Load into kind
          kind load docker-image ghcr.io/${{ github.repository }}/user-service:${{ github.sha }} --name prod

      - name: Create namespace
        run: |
          kubectl create namespace user-service-prod || true

      - name: Verify SBOM before production deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## 🔐 Production SBOM Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**CRITICAL**: Production deployment requires SBOM validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CI_RUN_ID="${{ github.event.workflow_run.id }}"

          # Download SBOM from CI workflow
          gh run download $CI_RUN_ID --name sbom --dir ./sbom-prod || {
            echo "❌ **DEPLOYMENT BLOCKED**: No SBOM found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Production policy:** Cannot deploy without validated SBOM" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**The reality:** Cross-workflow artifact sharing is complex" >> $GITHUB_STEP_SUMMARY
            echo "- Artifacts expire (90 days default)" >> $GITHUB_STEP_SUMMARY
            echo "- No built-in artifact verification" >> $GITHUB_STEP_SUMMARY
            echo "- Must build custom coordination logic" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⏩ **Proceeding with deployment** (for demo)" >> $GITHUB_STEP_SUMMARY
            echo "   **In real production: This would HARD FAIL**" >> $GITHUB_STEP_SUMMARY
            exit 0  # Don't block demo
          }

          if [ -f ./sbom-prod/sbom.spdx.json ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq jq > /dev/null 2>&1

            PACKAGE_COUNT=$(jq '.packages | length' ./sbom-prod/sbom.spdx.json)

            echo "✅ **SBOM validated for production**" >> $GITHUB_STEP_SUMMARY
            echo "- Packages: $PACKAGE_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- CI Run: #$CI_RUN_ID" >> $GITHUB_STEP_SUMMARY
            echo "- Verified: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Production-specific checks
            echo "**Production-specific validations:**" >> $GITHUB_STEP_SUMMARY

            # Check for dev dependencies (shouldn't be in production)
            DEV_DEPS=$(jq -r '.packages[] | select(.name | test("nodemon|jest|eslint"))' ./sbom-prod/sbom.spdx.json | wc -l || echo "0")

            if [ "$DEV_DEPS" -gt 0 ]; then
              echo "⚠️ **WARNING**: Found $DEV_DEPS dev dependencies in production image" >> $GITHUB_STEP_SUMMARY
              echo "   (This increases attack surface)" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ No dev dependencies found (clean production image)" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Production deployment gate PASSED**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create environment-specific config
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://prod-db.internal:5432/users_production' }}
          API_KEY: ${{ secrets.API_KEY || 'prod-api-key-CHANGE-ME' }}
          ENVIRONMENT: production
        run: |
          # Create ConfigMap with environment-specific configuration
          kubectl create configmap user-service-config \
            --from-literal=ENVIRONMENT=$ENVIRONMENT \
            --from-literal=LOG_LEVEL=info \
            --from-literal=FEATURE_FLAGS='{"newUI":false,"betaFeatures":false}' \
            -n user-service-prod \
            --dry-run=client -o yaml | kubectl apply -f -

          # Create Secret with sensitive data (DB credentials, API keys)
          kubectl create secret generic user-service-secrets \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=API_KEY="$API_KEY" \
            -n user-service-prod \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "✅ Production environment config created"
          echo "   Environment: production"
          echo "   Log Level: info"
          echo "   Database: ${DATABASE_URL%%:*}://***" # Show only protocol
          echo "   API Key: ${API_KEY:0:3}***" # Show only first 3 chars

      - name: Update deployment manifest with actual image
        run: |
          sed -i "s|IMAGE_TAG|ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}|g" services/user-service/k8s/deployment.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f services/user-service/k8s/ -n user-service-prod

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/user-service -n user-service-prod --timeout=5m

      - name: Verify pods are running
        run: |
          kubectl get pods -n user-service-prod
          kubectl wait --for=condition=ready pod -l app=user-service -n user-service-prod --timeout=3m

      - name: Run production smoke tests
        run: |
          kubectl port-forward -n user-service-prod svc/user-service 3000:3000 &
          PF_PID=$!
          sleep 5

          # Test health endpoint
          curl -f http://localhost:3000/health || exit 1

          # Test users endpoint
          curl -f http://localhost:3000/api/users || exit 1

          # Test metrics endpoint
          curl -f http://localhost:3000/metrics || exit 1

          # Test creating a user
          RESPONSE=$(curl -s -X POST http://localhost:3000/api/users \
            -H "Content-Type: application/json" \
            -d '{"name":"Prod User","email":"prod@example.com"}')

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q "Prod User"; then
            echo "✅ POST /api/users works in production"
          else
            echo "❌ POST /api/users failed in production"
            exit 1
          fi

          kill $PF_PID

          echo "✅ All Production smoke tests passed"

      - name: Get deployment info
        if: always()
        run: |
          echo "## 🔴 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pods" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n user-service-prod >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n user-service-prod >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Show logs on failure
        if: failure()
        run: |
          echo "## Production Pod Logs" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl logs -n user-service-prod -l app=user-service --tail=100 >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-prod]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## 🚀 Deployment Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dev | ${{ needs.deploy-dev.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.deploy-prod.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Flow" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ CI Pipeline (build, scan, sign)" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ Deploy to Dev (automatic)" >> $GITHUB_STEP_SUMMARY
          echo "3. ⏸️  Manual approval required" >> $GITHUB_STEP_SUMMARY
          echo "4. ✅ Deploy to Production" >> $GITHUB_STEP_SUMMARY
