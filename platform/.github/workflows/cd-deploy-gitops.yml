# REUSABLE WORKFLOW: CD GitOps Deployment
# Version: v2.3.0
# Owner: Platform Engineering Team
#
# Model B: GitHub Actions updates GitOps repo, ArgoCD handles deployment
# Benefits: Audit trail, easier rollback, declarative state
# Tradeoffs: Additional latency, ArgoCD dependency
#
# Usage:
#   uses: yourorg/platform/.github/workflows/cd-deploy-gitops.yml@v2.3.0

name: CD GitOps Deployment

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string

      environment:
        required: true
        type: string

      image-digest:
        required: true
        type: string

      image-tag:
        required: true
        type: string

      gitops-repo:
        required: false
        type: string
        default: 'yourorg/gitops'

      progressive-delivery:
        required: false
        type: boolean
        default: false
        description: 'Use Argo Rollouts for canary/blue-green'

permissions:
  contents: read
  id-token: write

jobs:
  # ============================================================================
  # JOB 1: Update GitOps Repository
  # ============================================================================
  update-gitops:
    name: Update GitOps Repo
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.gitops-repo }}
          token: ${{ secrets.GITOPS_TOKEN }}  # Bot account with write access
          path: gitops

      # CRITICAL: Verify image signature before updating GitOps repo
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify image signature
        run: |
          cosign verify \
            ghcr.io/${{ github.repository_owner }}/${{ inputs.service-name }}@${{ inputs.image-digest }} \
            --certificate-identity-regexp=".*" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com
        env:
          COSIGN_EXPERIMENTAL: 1

      # Update image in GitOps manifests
      - name: Update image reference
        run: |
          cd gitops/apps/${{ inputs.environment }}/${{ inputs.service-name }}

          # Update image to use digest (immutable reference)
          NEW_IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.service-name }}@${{ inputs.image-digest }}"

          if [ -f "kustomization.yaml" ]; then
            # Using Kustomize
            kustomize edit set image ${{ inputs.service-name }}=$NEW_IMAGE
          elif [ -f "values.yaml" ]; then
            # Using Helm
            yq eval ".image.repository = \"ghcr.io/${{ github.repository_owner }}/${{ inputs.service-name }}\"" -i values.yaml
            yq eval ".image.tag = \"${{ inputs.image-digest }}\"" -i values.yaml
          else
            # Plain YAML
            sed -i "s|image:.*${{ inputs.service-name }}.*|image: $NEW_IMAGE|g" *.yaml
          fi

      - name: Commit and push changes
        run: |
          cd gitops

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "chore: update ${{ inputs.service-name }} in ${{ inputs.environment }}

          Service: ${{ inputs.service-name }}
          Environment: ${{ inputs.environment }}
          Image: ${{ inputs.image-tag }}
          Digest: ${{ inputs.image-digest }}
          Workflow: ${{ github.repository }}/.github/workflows/${{ github.workflow }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Commit: ${{ github.sha }}
          "

          git push origin main

      - name: Create GitOps summary
        run: |
          echo "# GitOps Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Service**: ${{ inputs.service-name }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Image**: \`${{ inputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Digest**: \`${{ inputs.image-digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "✅ **GitOps commit pushed**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏳ **ArgoCD will now sync the deployment**" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # JOB 2: Wait for ArgoCD Sync
  # ============================================================================
  wait-for-sync:
    name: Wait for ArgoCD Sync
    runs-on: ubuntu-latest
    needs: update-gitops

    steps:
      # Install ArgoCD CLI
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      # Login to ArgoCD
      - name: Login to ArgoCD
        run: |
          # In production: Use OIDC or API token
          # argocd login argocd.example.com \
          #   --auth-token ${{ secrets.ARGOCD_TOKEN }} \
          #   --grpc-web

          echo "✅ ArgoCD login (simulated)"

      # Trigger sync (optional - ArgoCD can auto-sync)
      - name: Trigger ArgoCD sync
        run: |
          # argocd app sync ${{ inputs.service-name }}-${{ inputs.environment }} \
          #   --prune \
          #   --timeout 600

          echo "✅ ArgoCD sync triggered (simulated)"

      # Wait for sync to complete
      - name: Wait for sync completion
        run: |
          # argocd app wait ${{ inputs.service-name }}-${{ inputs.environment }} \
          #   --health \
          #   --timeout 600

          echo "⏳ Waiting for ArgoCD to sync..."
          sleep 30
          echo "✅ ArgoCD sync completed (simulated)"

  # ============================================================================
  # JOB 3: Post-Deployment Verification (Same as direct model)
  # ============================================================================
  verify:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: wait-for-sync

    steps:
      - name: Wait for stabilization
        run: sleep 60

      - name: Health check
        run: |
          echo "✅ Health check passed (simulated)"

      - name: Continuous verification with Argo Rollouts
        if: inputs.progressive-delivery
        run: |
          # If using Argo Rollouts for canary/blue-green:
          # kubectl argo rollouts status ${{ inputs.service-name }} -n ${{ inputs.environment }}
          #
          # Argo Rollouts can automatically:
          # - Deploy canary (10% traffic)
          # - Run analysis (query Prometheus)
          # - Promote or abort based on metrics

          echo "✅ Progressive delivery verification (simulated)"

      - name: Report deployment metrics
        if: always()
        run: |
          echo "📊 Deployment metrics reported (simulated)"
